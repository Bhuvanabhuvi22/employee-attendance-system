<!DOCTYPE html>
<html>
<head>
    <title>Employee Attendance Monitor</title>

</head>
<body>

<div class="container">

<h2>Employee Attendance Monitor</h2>

<input type="text" id="empCode" placeholder="Employee Code">

<button onclick="checkOut()">Check Out</button>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
